<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>webexp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="webview-container">
    <div id="webview-header">
      <button id="home-btn" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <span id="url-display"></span>
      <button id="reader-btn" style="display:none" title="Modo lectura">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </button>
      <button id="share-btn" title="Compartir">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
    </div>
    <iframe id="webview-frame" src="https://revfran.github.io/web-experiments/news.html"></iframe>
    <div id="reader-pane" class="hidden">
      <div id="reader-url-bar">
        <input id="reader-url-input" type="url" placeholder="https://...">
        <button id="reader-load-btn">Leer</button>
      </div>
      <p id="reader-loading" class="hidden">Cargando artículo…</p>
      <div id="reader-scroll">
        <article id="reader-article"></article>
      </div>
    </div>
  </div>

  <script src="js/Readability.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
